services:
  - type: web
    name: university-advisor-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python import_universities.py --file data/universities_real.csv --update && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # you fill this in Render dashboard
      - key: DATABASE_URL
        sync: false        # you fill this in Render dashboard