<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniAdvisor — Study Abroad Consultant Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1f2e45;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --accent-glow: rgba(59,130,246,0.15);
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --success: #10b981;
    --warn: #f59e0b;
    --user-bubble: #1e3a5f;
    --ai-bubble: #111827;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.3px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .stats-bar {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
  .stat-dot.warn { background: var(--warn); }
  .new-chat-btn {
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .new-chat-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  /* ── Main Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .sidebar-title {
    padding: 16px 18px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .profile-form {
    padding: 0 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    flex: 1;
  }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .field-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 11px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--text-muted); }
  select.field-input option { background: var(--surface2); }
  .fill-btn {
    margin-top: 4px;
    padding: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .fill-btn:hover { opacity: 0.85; }

  /* ── Chat Area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome screen */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 40px;
    opacity: 0.7;
  }
  .welcome-icon { font-size: 48px; }
  .welcome h2 { font-size: 22px; font-weight: 600; color: var(--text-dim); }
  .welcome p { font-size: 14px; color: var(--text-muted); max-width: 340px; line-height: 1.6; }
  .quick-prompts { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .quick-prompt {
    padding: 10px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: 'Sora', sans-serif;
  }
  .quick-prompt:hover { border-color: var(--accent); color: var(--text); background: var(--accent-glow); }

  /* Message bubbles */
  .message { display: flex; gap: 12px; max-width: 820px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.ai { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .avatar.user { background: var(--user-bubble); border: 1px solid var(--accent); }
  .avatar.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

  .bubble {
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 680px;
  }
  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(59,130,246,0.3);
    border-top-right-radius: 4px;
  }
  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  /* Markdown styling inside bubbles */
  .bubble h1, .bubble h2, .bubble h3 {
    font-size: 15px; font-weight: 600; margin: 12px 0 6px;
    color: var(--accent2);
  }
  .bubble h1:first-child, .bubble h2:first-child { margin-top: 0; }
  .bubble strong { color: var(--text); font-weight: 600; }
  .bubble em { color: var(--text-dim); }
  .bubble a { color: var(--accent); text-decoration: none; }
  .bubble a:hover { text-decoration: underline; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }
  .bubble code {
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
  }
  .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .bubble blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    color: var(--text-dim);
    margin: 8px 0;
  }

  .typing-indicator {
    display: flex; align-items: center; gap: 5px;
    padding: 14px 18px;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
  }
  .dot { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* ── Input Bar ── */
  .input-bar {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent); }
  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    line-height: 1.5;
  }
  #userInput::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 9px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .input-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎓</div>
    UniAdvisor
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-dot" id="dbDot"></div><span id="dbStat">Loading...</span></div>
  </div>
  <button class="new-chat-btn" onclick="newChat()">+ New Consultation</button>
</header>

<div class="main">

  <!-- Sidebar: Student Profile -->
  <div class="sidebar">
    <div class="sidebar-title">Student Profile</div>
    <div class="profile-form">
      <div class="field-group">
        <label class="field-label">GPA (out of 4.0)</label>
        <input class="field-input" id="gpa" type="number" step="0.1" min="0" max="4" placeholder="e.g. 3.2">
      </div>
      <div class="field-group">
        <label class="field-label">IELTS Score</label>
        <input class="field-input" id="ielts" type="number" step="0.5" min="0" max="9" placeholder="e.g. 6.5">
      </div>
      <div class="field-group">
        <label class="field-label">TOEFL Score</label>
        <input class="field-input" id="toefl" type="number" min="0" max="120" placeholder="e.g. 85">
      </div>
      <div class="field-group">
        <label class="field-label">Annual Budget (USD)</label>
        <input class="field-input" id="budget" type="number" step="1000" placeholder="e.g. 20000">
      </div>
      <div class="field-group">
        <label class="field-label">Preferred Countries</label>
        <input class="field-input" id="countries" placeholder="e.g. UK, Germany, Canada">
      </div>
      <div class="field-group">
        <label class="field-label">Desired Program</label>
        <input class="field-input" id="programs" placeholder="e.g. Computer Science, MBA">
      </div>
      <div class="field-group">
        <label class="field-label">Additional Notes</label>
        <textarea class="field-input" id="notes" rows="3" placeholder="Scholarship needed, specific city, work permit..."></textarea>
      </div>
      <button class="fill-btn" onclick="fillFromProfile()">Use Profile in Chat →</button>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🌍</div>
        <h2>University Matching Assistant</h2>
        <p>Describe a student's situation and I'll find the best matching universities from your partner database.</p>
        <div class="quick-prompts">
          <button class="quick-prompt" onclick="quickSend(this.textContent)">Student with GPA 3.5, IELTS 7.0, budget $15k/year — looking for Computer Science in Europe</button>
          <button class="quick-prompt" onclick="quickSend(this.textContent)">Show me universities in Germany that accept students with IELTS 6.0</button>
          <button class="quick-prompt" onclick="quickSend(this.textContent)">Student needs a scholarship, GPA 3.8, wants Business or Finance</button>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-row">
        <textarea id="userInput" placeholder="Describe the student's situation..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://web-production-85864.up.railway.app";
let history = [];

// ── Fetch stats on load ────────────────────────────────────────────────────
async function loadStats() {
  try {
    const r = await fetch(`${API_BASE}/stats`);
    const data = await r.json();
    document.getElementById("dbStat").textContent =
      `${data.total} universities · ${data.scraped} scraped`;
    document.getElementById("dbDot").className =
      `stat-dot${data.pending > 0 ? ' warn' : ''}`;
  } catch {
    document.getElementById("dbStat").textContent = "API offline";
    document.getElementById("dbDot").style.background = "#ef4444";
  }
}
loadStats();

// ── Simple markdown renderer ───────────────────────────────────────────────
function renderMarkdown(text) {
  return text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

// ── Add message to chat ────────────────────────────────────────────────────
function addMessage(role, text) {
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();

  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `message ${role}`;

  const avatar = role === "user" ? "👤" : "🤖";
  div.innerHTML = `
    <div class="avatar ${role}">${avatar}</div>
    <div class="bubble">${role === "ai" ? renderMarkdown(text) : escapeHtml(text)}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function addTyping() {
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "message ai";
  div.id = "typing";
  div.innerHTML = `
    <div class="avatar ai">🤖</div>
    <div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Build profile string from sidebar ─────────────────────────────────────
function buildProfileContext() {
  const gpa = document.getElementById("gpa").value;
  const ielts = document.getElementById("ielts").value;
  const toefl = document.getElementById("toefl").value;
  const budget = document.getElementById("budget").value;
  const countries = document.getElementById("countries").value;
  const programs = document.getElementById("programs").value;
  const notes = document.getElementById("notes").value;

  let parts = [];
  if (gpa) parts.push(`GPA: ${gpa}/4.0`);
  if (ielts) parts.push(`IELTS: ${ielts}`);
  if (toefl) parts.push(`TOEFL: ${toefl}`);
  if (budget) parts.push(`Budget: $${parseInt(budget).toLocaleString()}/year`);
  if (countries) parts.push(`Preferred countries: ${countries}`);
  if (programs) parts.push(`Desired program: ${programs}`);
  if (notes) parts.push(`Notes: ${notes}`);
  return parts.length ? `[Student Profile: ${parts.join(' | ')}]` : "";
}

function fillFromProfile() {
  const ctx = buildProfileContext();
  if (!ctx) return alert("Please fill in at least one profile field.");
  document.getElementById("userInput").value =
    ctx + "\n\nPlease recommend the best matching universities for this student.";
  document.getElementById("userInput").focus();
  autoResize(document.getElementById("userInput"));
}

// ── Send message ───────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  autoResize(input);
  document.getElementById("sendBtn").disabled = true;

  addMessage("user", text);
  addTyping();

  // Build payload
  const payload = {
    message: text,
    gpa: parseFloat(document.getElementById("gpa").value) || null,
    ielts: parseFloat(document.getElementById("ielts").value) || null,
    toefl: parseInt(document.getElementById("toefl").value) || null,
    budget_usd: parseInt(document.getElementById("budget").value) || null,
    preferred_countries: document.getElementById("countries").value
      .split(",").map(s => s.trim()).filter(Boolean),
    preferred_programs: document.getElementById("programs").value
      .split(",").map(s => s.trim()).filter(Boolean),
    history: history,
  };

  try {
    const r = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await r.json();

    document.getElementById("typing")?.remove();

    const reply = data.reply || data.detail || "No response.";
    addMessage("ai", reply);

    // Update history
    history.push({ role: "user", content: text });
    history.push({ role: "assistant", content: reply });
    if (history.length > 20) history = history.slice(-20);

  } catch (err) {
    document.getElementById("typing")?.remove();
    addMessage("ai", "⚠️ Could not connect to the backend. Make sure the API server is running on `localhost:8000`.");
  }

  document.getElementById("sendBtn").disabled = false;
}

function quickSend(text) {
  document.getElementById("userInput").value = text;
  sendMessage();
}

function newChat() {
  history = [];
  const msgs = document.getElementById("messages");
  msgs.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🌍</div>
      <h2>University Matching Assistant</h2>
      <p>Describe a student's situation and I'll find the best matching universities from your partner database.</p>
      <div class="quick-prompts">
        <button class="quick-prompt" onclick="quickSend(this.textContent)">Student with GPA 3.5, IELTS 7.0, budget $15k/year — looking for Computer Science in Europe</button>
        <button class="quick-prompt" onclick="quickSend(this.textContent)">Show me universities in Germany that accept students with IELTS 6.0</button>
        <button class="quick-prompt" onclick="quickSend(this.textContent)">Student needs a scholarship, GPA 3.8, wants Business or Finance</button>
      </div>
    </div>`;
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}
</script>
</body>
</html>
